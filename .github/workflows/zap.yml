name: "DAST Analysis (OWASP ZAP)"

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  zap_scan:
    name: ZAP Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Start OWASP Juice Shop Docker Container
      run: |
        docker run -d -p 3000:3000 --name my-juice-shop bkimminich/juice-shop
        echo "Waiting for Juice Shop to start..."
        sleep 20 

    - name: Get Juice Shop IP Address
      run: |
        JUICE_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' my-juice-shop)
        echo "JUICE_IP=$JUICE_IP" >> $GITHUB_ENV
        echo "Juice shop is running at http://$JUICE_IP:3000"

    - name: Run OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.10.0
      with:
        target: 'http://${{ env.JUICE_IP }}:3000'
        fail_action: false 
        allow_issue_writing: false
